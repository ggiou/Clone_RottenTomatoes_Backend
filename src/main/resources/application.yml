    driver-class-name: org.h2.Driver
    username: sa
    password:

  mail:
    host: smtp.naver.com
    port: 587
    username: REMOVED_SECRET_EMAIL
    password: REMOVED_SECRET
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true # 587 포트 사용 시 true
      mail.smtp.ssl.enable: false # 587 포트 사용 시 false
